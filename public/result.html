<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concrete Quiz — Results</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .result-page {
      min-height: calc(100vh - 73px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .result-inner {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    /* ---- SCORE RING ---- */
    .score-ring-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 28px;
    }

    .score-ring-svg {
      transform: rotate(-90deg);
      width: 180px;
      height: 180px;
    }

    .ring-track { fill: none; stroke: var(--bg3); stroke-width: 10; }
    .ring-fill {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 452;
      stroke-dashoffset: 452;
      transition: stroke-dashoffset 1.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .score-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .score-big {
      font-family: 'Space Mono', monospace;
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
    }

    .score-slash {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--text3);
    }

    /* ---- RANK ---- */
    .rank-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 7px 18px;
      border-radius: 100px;
      margin-bottom: 14px;
    }
    .rank-expert      { background: rgba(250,204,21,0.12); border: 1px solid rgba(250,204,21,0.5); color: #facc15; }
    .rank-advanced    { background: var(--orange-dim);     border: 1px solid var(--orange-glow);   color: var(--orange); }
    .rank-intermediate{ background: rgba(96,165,250,0.1);  border: 1px solid rgba(96,165,250,0.35);color: #60a5fa; }
    .rank-beginner    { background: var(--bg3);            border: 1px solid var(--border2);       color: var(--text2); }

    .score-heading {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .score-sub {
      color: var(--text2);
      font-size: 0.9rem;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    /* ---- BREAKDOWN ---- */
    .breakdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 36px;
    }

    .breakdown-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 12px;
    }

    .breakdown-val {
      font-family: 'Space Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      display: block;
      line-height: 1;
      margin-bottom: 6px;
    }

    .breakdown-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
    }

    /* ---- CTA BUTTONS ---- */
    .result-ctas {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">
    <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><rect width="32" height="32" rx="6" fill="#f5e642"/><rect x="7" y="6" width="18" height="2.5" rx="1" fill="#1a1a1a"/><rect x="7" y="23.5" width="18" height="2.5" rx="1" fill="#1a1a1a"/><text x="16" y="20.5" font-family="Georgia,serif" font-size="14" font-weight="700" fill="#1a1a1a" text-anchor="middle">C</text></svg>
    Concrete Quiz
  </a>
  <span class="nav-badge">Results</span>
</nav>

<main class="result-page">
  <div class="result-inner">

    <!-- Score Ring -->
    <div class="score-ring-wrap">
      <svg class="score-ring-svg" viewBox="0 0 180 180">
        <circle class="ring-track" cx="90" cy="90" r="72" />
        <circle class="ring-fill" id="ringFill" cx="90" cy="90" r="72" />
      </svg>
      <div class="score-center">
        <span class="score-big" id="scoreNum">—</span>
        <span class="score-slash" id="scoreDenom">/ 15</span>
      </div>
    </div>

    <div class="rank-badge" id="rankBadge"></div>
    <div class="score-heading" id="scoreHeading"></div>
    <p class="score-sub" id="scoreSub"></p>

    <!-- Stat Breakdown -->
    <div class="breakdown">
      <div class="breakdown-item">
        <span class="breakdown-val" id="statCorrect" style="color:var(--green)">—</span>
        <span class="breakdown-label">Correct</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-val" id="statWrong" style="color:var(--red)">—</span>
        <span class="breakdown-label">Wrong</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-val" id="statPct" style="color:var(--orange)">—</span>
        <span class="breakdown-label">Accuracy</span>
      </div>
    </div>

    <!-- CTAs -->
    <div class="result-ctas">
      <button class="btn btn-primary" onclick="retakeQuiz()">↺ Retake Quiz</button>
      <a href="https://app.concrete.xyz/earn" target="_blank" rel="noopener" class="btn btn-secondary">
        Launch App ↗
      </a>
      <a href="https://docs.concrete.xyz/Overview/welcome" target="_blank" rel="noopener" class="btn btn-ghost">
        Read Docs ↗
      </a>
    </div>

  </div>
</main>

<script>
  const RANKS = [
    { min: 13, label: '🏆 Expert',       cls: 'rank-expert' },
    { min: 10, label: '⚡ Advanced',     cls: 'rank-advanced' },
    { min: 6,  label: '📘 Intermediate', cls: 'rank-intermediate' },
    { min: 0,  label: '🌱 Beginner',     cls: 'rank-beginner' },
  ];

  const HEADINGS = {
    expert:       'Outstanding Knowledge!',
    advanced:     'Strong Performance!',
    intermediate: 'Keep Building!',
    beginner:     'Good Start!',
  };

  window.addEventListener('DOMContentLoaded', () => {
    const rawScore = sessionStorage.getItem('quiz_score');
    const rawTotal = sessionStorage.getItem('quiz_total');

    // Guard: must have come from quiz page
    if (rawScore === null || rawTotal === null) {
      window.location.href = '/';
      return;
    }

    const score = parseInt(rawScore, 10);
    const total = parseInt(rawTotal, 10);

    if (isNaN(score) || isNaN(total) || total === 0) {
      window.location.href = '/';
      return;
    }

    const pct = score / total;
    const wrong = total - score;
    const CIRCUMFERENCE = 452; // 2 * Math.PI * 72 ≈ 452.4

    // ── Ring color ──────────────────────────────────────
    const ring = document.getElementById('ringFill');
    if      (pct >= 0.87) ring.style.stroke = '#facc15';
    else if (pct >= 0.67) ring.style.stroke = 'var(--orange)';
    else if (pct >= 0.40) ring.style.stroke = '#60a5fa';
    else                  ring.style.stroke = 'var(--red)';

    // Trigger animation on next frame
    requestAnimationFrame(() => {
      setTimeout(() => {
        ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
      }, 80);
    });

    // ── Count-up ────────────────────────────────────────
    const numEl = document.getElementById('scoreNum');
    numEl.textContent = '0';
    if (score === 0) {
      numEl.textContent = '0';
    } else {
      let displayed = 0;
      const step = Math.ceil(score / 20); // finish in ~20 ticks
      const iv = setInterval(() => {
        displayed = Math.min(displayed + step, score);
        numEl.textContent = displayed;
        if (displayed >= score) clearInterval(iv);
      }, 60);
    }

    document.getElementById('scoreDenom').textContent = `/ ${total}`;

    // ── Rank & heading ──────────────────────────────────
    const rank = RANKS.find(r => score >= r.min);
    const badgeEl = document.getElementById('rankBadge');
    badgeEl.textContent = rank.label;
    badgeEl.className = 'rank-badge ' + rank.cls;

    const tier = rank.cls.replace('rank-', '');
    document.getElementById('scoreHeading').textContent = HEADINGS[tier] || 'Quiz Complete!';

    // ── Sub text ────────────────────────────────────────
    let sub;
    if (score === total)  sub = 'Perfect score! You know Concrete inside and out.';
    else if (score >= 13) sub = `Only ${wrong} away from perfect. Excellent work!`;
    else if (score >= 10) sub = `You answered ${score} of ${total} correctly. Strong understanding of Concrete.`;
    else if (score >= 6)  sub = `You answered ${score} of ${total} correctly. Review the docs to go further.`;
    else                  sub = `You answered ${score} of ${total} correctly. Read the Concrete docs to build your knowledge.`;
    document.getElementById('scoreSub').textContent = sub;

    // ── Stats ───────────────────────────────────────────
    document.getElementById('statCorrect').textContent = score;
    document.getElementById('statWrong').textContent   = wrong;
    document.getElementById('statPct').textContent     = Math.round(pct * 100) + '%';
  });

  function retakeQuiz() {
    sessionStorage.removeItem('quiz_questions');
    sessionStorage.removeItem('quiz_score');
    sessionStorage.removeItem('quiz_total');
    window.location.href = '/';
  }
</script>
</body>
</html>
